- data:
    DOI: 10.48550/arXiv.2507.12025
    ISSN: ''
    PMCID: ''
    PMID: ''
    abstractNote: We classify the possible Scott complexities for models of Peano
      arithmetic. We construct models of particular complexities by first giving a
      complete Scott analysis of colored linear orderings and constructing models
      of Peano arithmetic from these colored orderings. We also provide tight connections
      of certain Scott complexities with notions from the classical theory of models
      of Peano arithmetic, such as prime, finitely generated, and recursively saturated.
      This effort provides a powerful set of tools to understand the models of Peano
      arithmetic.
