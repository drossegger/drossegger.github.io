    abstractNote: "We consider highness in the context of computable structure theory\
      \ and, particularly, the Scott rank of a structure. We define highness for Scott\
      \ rank and highness for computably defined Scott rank $\u03B1$ and characterize\
      \ them in terms of the ability to compute $\u0394^0_\u03B2$ sets for appropriate\
      \ $\u03B2$. We close with a discussion of the index sets of structures with\
      \ a given Scott rank or computably defined Scott rank and a few words about\
      \ highness for noncomputable Scott ranks."
