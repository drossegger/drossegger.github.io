- data:
    DOI: 10.48550/arXiv.2512.09832
    ISSN: ''
    PMCID: ''
    PMID: ''
    abstractNote: 'We study classes of countable graphs where every member does not
      contain a given finite graph as an induced subgraph -- denoted by $\mathsf{Free}(\mathcal{G})$
      for a given finite graph $\mathcal{G}$. Our main results establish a structural
      dichotomy for such classes: If $\mathcal{G}$ is not an induced subgraph of $\mathcal{P}_4$,
      then $\mathsf{Free}(\mathcal{G})$ is on top under effective bi-interpretability,
      implying that the members of $\mathsf{Free}(\mathcal{G})$ exhibit the full range
      of structural and computational behaviors. In contrast, if $\mathcal{G}$ is
      an induced subgraph of $\mathcal{P}_4$, then $\mathsf{Free}(\mathcal{G})$ is
      structurally simple, as witnessed by the fact that every member satisfies the
      computable embeddability condition. This dichotomy is mirrored in the finite
      setting when one considers combinatorial and complexity-theoretic properties.
      Specifically, it is known that $\mathsf{Free}(\mathcal{G})^{fin}$ is complete
      for graph isomorphism and not a well-quasi-order under embeddability whenever
      $\mathcal{G}$ is not an induced subgraph of $\mathcal{P}_4$, while in all other
      cases $\mathsf{Free}(\mathcal{G})^{fin}$ forms a well-quasi-order and the isomorphism
      problem for $\mathsf{Free}(\mathcal{G})^{fin}$ is solvable in polynomial time.'
