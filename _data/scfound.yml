- data:
    DOI: 10.48550/arXiv.2606.15205
    ISSN: ''
    PMCID: ''
    PMID: ''
    abstractNote: "We develop new tools for determining the existence of models of\
      \ specific Scott ranks under countability conditions. Using these, we improve\
      \ a result of Sacks by showing that any counterexample to Vaught's conjecture\
      \ must have at least two models of every parameterized Scott rank -- a result\
      \ that contrasts with the unparameterized case, where minimal counterexamples\
      \ have only one model at many ranks. We further prove that theories with fewer\
      \ than continuum many models have trivial Scott spectra and provide a general,\
      \ systematic classification of low Scott rank models when only countably many\
      \ $\u03A3_\u03B1$-types are realized. Additionally, we classify the Scott complexity\
      \ spectra for many Ehrenfeucht theories, and prove the $\u03C9$-Vaught's conjecture\
      \ in this setting, answering an infinitary strengthening of a question of Pillay\
      \ and Tanovi\u0107. We demonstrate that the Scott complexity of prime models\
      \ for $\u03C9$-stable first-order theories is commensurate with the complexity\
      \ of the theory itself. Along the way, we apply our methods to concrete theories\
      \ like p-groups, trees, and Boolean algebras, answering questions of Harris--Montalb\xE1\
      n and Alvir--Csima--MacLean regarding specific structures."
